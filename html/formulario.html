<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legacy - Reservas</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/formulario.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sekuya&display=swap" rel="stylesheet">
    <link rel="icon" href="../img/iconoweb.png">
</head>

<body>
    <header>
        <nav class="nav">
            <div class="logo">
                <a href="../index.html"
                    style="font-family: 'Sekuya', system-ui; font-size: 1.5rem; text-decoration: none; color: #000;">Legacy</a>
            </div>

            <ul>
                <li><a href="../index.html">Inicio</a></li>
                <li><a href="../index.html#servicios">Servicios</a></li>
                <li><a href="../index.html#contacto">Contacto</a></li>
            </ul>
        </nav>
    </header>
    <hr>

    <main>
        <section class="reservation-section">
            <div class="form-container">
                <div class="form-header">
                    <h2 class="sekuya-regular">Reserva tu Cita</h2>
                    <p>Completa el siguiente formulario para agendar tu visita.</p>
                </div>

                <form action="#" method="POST" class="reservation-form">
                    <div class="form-group">
                        <label for="nombre">Nombre Completo</label>
                        <input type="text" id="nombre" name="nombre" placeholder="Ej. Juan Pérez" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Correo Electrónico</label>
                        <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>
                    </div>

                    <div class="form-group">
                        <label for="telefono">Teléfono</label>
                        <input type="tel" id="telefono" name="telefono" placeholder="+34 600 000 000" required>
                    </div>

                    <div class="form-group">
                        <label for="servicio">Servicio</label>
                        <select id="servicio" name="servicio" required>
                            <option value="" disabled selected>Selecciona un servicio</option>
                            <option value="classic">Legacy Service Classic - £40.00 (40 min)</option>
                            <option value="plus">Legacy Service Plus - £60.00 (60 min)</option>
                            <option value="beard">Legacy Service Beard - £40.00 (20 min)</option>
                            <option value="kids">Legacy Service Kids - £20.00 (30 min)</option>
                        </select>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="fecha">Fecha</label>
                            <input type="date" id="fecha" name="fecha" required>
                        </div>

                        <div class="form-group">
                            <label for="hora">Hora</label>
                            <input type="time" id="hora" name="hora" min="09:00" max="20:00" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="comentarios">Comentarios Adicionales</label>
                        <textarea id="comentarios" name="comentarios" rows="4"
                            placeholder="¿Alguna petición especial?"></textarea>
                    </div>

                    <button type="submit" class="submit-btn">Confirmar Reserva</button>
                </form>
            </div>
        </section>
    </main>

    <script>
        document.querySelector('.reservation-form').addEventListener('submit', function(event) {
            event.preventDefault(); // Evita que se recargue la página al enviar
            alert('Ahora mismo no está disponible.');
        });
    </script>
</body>

</html>
